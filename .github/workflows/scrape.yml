name: Scrape vacancies

on:
  schedule:
    - cron: "0 6 * * *"   # каждый день в 06:00 UTC (≈09:00 МСК)
  workflow_dispatch:       # ручной запуск из вкладки Actions
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/scrape.yml"

permissions:
  contents: write   # чтобы коммитить vacancies.db и vacancies.json
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python main.py

      - name: Commit data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add vacancies.db web/vacancies.json
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "data: scrape $(date -u +%Y-%m-%d)"
            for i in 1 2 3; do
              git pull --rebase origin main && git push && break
              echo "push failed, retry $i"
              sleep 5
            done
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

  deploy:
    needs: scrape
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
