<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Вакансии · Аналитик / Product</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --panel-2: #1d2129;
    --border: #262b35;
    --text: #e6e8eb;
    --muted: #8b94a3;
    --accent: #4c8bf5;
    --accent-2: #7aa7ff;
    --good: #3ddc97;
    --warn: #f6b73c;
    --priority: #ffd76a;
  }
  * { box-sizing: border-box; }
  html, body { background: var(--bg); color: var(--text); margin: 0; font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  a { color: var(--accent-2); text-decoration: none; }
  a:hover { text-decoration: underline; }

  header { padding: 24px 28px 12px; border-bottom: 1px solid var(--border); }
  header h1 { margin: 0 0 4px; font-size: 20px; font-weight: 600; }
  header .meta { color: var(--muted); font-size: 12px; }

  main { display: grid; grid-template-columns: 280px 1fr; gap: 0; min-height: calc(100vh - 65px); }

  aside {
    background: var(--panel);
    border-right: 1px solid var(--border);
    padding: 20px;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
  }
  aside h3 { font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin: 18px 0 8px; }
  aside h3:first-child { margin-top: 0; }
  .filter-group { display: flex; flex-direction: column; gap: 6px; }
  .filter-group label { display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none; padding: 4px 6px; border-radius: 4px; }
  .filter-group label:hover { background: var(--panel-2); }
  .filter-group input[type=checkbox] { accent-color: var(--accent); }
  .filter-group .count { color: var(--muted); margin-left: auto; font-size: 12px; }

  input[type=text], input[type=number], select {
    width: 100%;
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 10px;
    border-radius: 6px;
    font-size: 13px;
    outline: none;
  }
  input:focus, select:focus { border-color: var(--accent); }

  .reset {
    margin-top: 18px;
    width: 100%;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 8px;
    border-radius: 6px;
    cursor: pointer;
  }
  .reset:hover { color: var(--text); border-color: var(--accent); }

  section.results { padding: 20px 28px 60px; }
  .toolbar {
    display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .toolbar .count { font-weight: 600; }
  .toolbar .right { margin-left: auto; display: flex; gap: 10px; align-items: center; }
  .toolbar .right label { color: var(--muted); font-size: 12px; }

  .cards { display: grid; grid-template-columns: 1fr; gap: 12px; }
  @media (min-width: 1100px) { .cards { grid-template-columns: 1fr 1fr; } }

  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
    display: flex; flex-direction: column; gap: 8px;
    transition: border-color .15s, transform .15s;
  }
  .card:hover { border-color: var(--accent); }
  .card.priority { border-left: 3px solid var(--priority); }

  .card .title { font-size: 15px; font-weight: 600; }
  .card .title a { color: var(--text); }
  .card .company { color: var(--muted); font-size: 13px; }
  .card .salary { color: var(--good); font-weight: 600; }
  .card .salary.gross::after { content: " (до вычета)"; color: var(--muted); font-weight: 400; font-size: 11px; }
  .card .meta { display: flex; gap: 8px; flex-wrap: wrap; font-size: 12px; color: var(--muted); }
  .card .meta .tag {
    background: var(--panel-2);
    border: 1px solid var(--border);
    padding: 2px 8px;
    border-radius: 999px;
  }
  .card .meta .tag.remote { color: var(--good); border-color: rgba(61,220,151,.3); }
  .card .meta .tag.moscow { color: var(--priority); border-color: rgba(255,215,106,.3); }
  .card .snippet { color: var(--muted); font-size: 13px; line-height: 1.5; }
  .card .snippet b, .card .snippet strong { color: var(--text); font-weight: 500; }
  .card .footer { display: flex; justify-content: space-between; align-items: center; margin-top: 4px; }
  .card .footer .role-tag { font-size: 11px; color: var(--accent-2); background: rgba(76,139,245,.1); padding: 2px 8px; border-radius: 999px; }
  .card .footer time { color: var(--muted); font-size: 11px; }

  .empty { color: var(--muted); padding: 40px; text-align: center; }
  .loading { color: var(--muted); padding: 40px; text-align: center; }
</style>
</head>
<body>
<header>
  <h1>Вакансии · Системный аналитик / Product</h1>
  <div class="meta" id="meta">Загрузка…</div>
</header>

<main>
  <aside>
    <h3>Поиск</h3>
    <input type="text" id="q" placeholder="Поиск по тексту…">

    <h3>Минимальная ЗП (₽)</h3>
    <input type="number" id="min-salary" min="0" step="50000" placeholder="например, 400000">

    <h3>Роль</h3>
    <div class="filter-group" id="f-role"></div>

    <h3>Локация</h3>
    <div class="filter-group" id="f-location">
      <label><input type="checkbox" id="only-priority"> Только Москва или удалёнка</label>
    </div>

    <h3>Формат</h3>
    <div class="filter-group" id="f-schedule"></div>

    <button class="reset" id="reset">Сбросить фильтры</button>
  </aside>

  <section class="results">
    <div class="toolbar">
      <div class="count" id="count">…</div>
      <div class="right">
        <label for="sort">Сортировка:</label>
        <select id="sort">
          <option value="date_desc">Сначала новые</option>
          <option value="date_asc">Сначала старые</option>
          <option value="salary_desc">ЗП ↓</option>
          <option value="salary_asc">ЗП ↑</option>
          <option value="priority">Приоритет (Мск/удалёнка)</option>
        </select>
      </div>
    </div>
    <div class="cards" id="cards"><div class="loading">Загрузка вакансий…</div></div>
  </section>
</main>

<script>
const SCHEDULE_LABELS = {
  remote: "удалёнка",
  fullDay: "полный день",
  flexible: "гибкий",
  shift: "сменный",
  flyInFlyOut: "вахта",
};

const state = {
  data: [],
  filtered: [],
  filters: {
    q: "",
    minSalary: 0,
    roles: new Set(),
    schedules: new Set(),
    onlyPriority: false,
  },
  sort: "date_desc",
};

const $ = (s) => document.querySelector(s);

async function load() {
  try {
    const r = await fetch("vacancies.json", { cache: "no-store" });
    if (!r.ok) throw new Error("HTTP " + r.status);
    const d = await r.json();
    state.data = d.vacancies || [];
    $("#meta").textContent =
      `Всего: ${d.count}. Обновлено: ${formatDate(d.generated_at)}`;
    buildFacets();
    apply();
  } catch (e) {
    $("#cards").innerHTML = `<div class="empty">Не удалось загрузить vacancies.json: ${e.message}<br><br>Запусти <code>python main.py</code>, чтобы сгенерировать.</div>`;
    $("#meta").textContent = "Ошибка";
  }
}

function buildFacets() {
  // Роли
  const roleCounts = {};
  for (const v of state.data) {
    const r = v.role_query || "—";
    roleCounts[r] = (roleCounts[r] || 0) + 1;
  }
  $("#f-role").innerHTML = Object.entries(roleCounts)
    .sort((a, b) => b[1] - a[1])
    .map(([r, c]) => `
      <label>
        <input type="checkbox" data-role="${esc(r)}">
        <span>${esc(r)}</span>
        <span class="count">${c}</span>
      </label>`).join("");

  // Графики работы
  const schedCounts = {};
  for (const v of state.data) {
    const s = v.schedule || "—";
    schedCounts[s] = (schedCounts[s] || 0) + 1;
  }
  $("#f-schedule").innerHTML = Object.entries(schedCounts)
    .sort((a, b) => b[1] - a[1])
    .map(([s, c]) => `
      <label>
        <input type="checkbox" data-schedule="${esc(s)}">
        <span>${esc(SCHEDULE_LABELS[s] || s)}</span>
        <span class="count">${c}</span>
      </label>`).join("");
}

function apply() {
  const f = state.filters;
  const q = f.q.trim().toLowerCase();

  state.filtered = state.data.filter((v) => {
    if (f.onlyPriority && v.priority !== 1) return false;

    if (f.roles.size && !f.roles.has(v.role_query)) return false;
    if (f.schedules.size && !f.schedules.has(v.schedule)) return false;

    if (f.minSalary) {
      const max = v.salary_to || v.salary_from || 0;
      if (max < f.minSalary) return false;
    }

    if (q) {
      const hay = [
        v.title, v.company, v.area_name,
        v.requirement, v.responsibility,
      ].filter(Boolean).join(" ").toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });

  sortFiltered();
  render();
}

function sortFiltered() {
  const s = state.sort;
  const sal = (v) => v.salary_to || v.salary_from || 0;
  const cmp = {
    date_desc:   (a, b) => (b.published_at || "").localeCompare(a.published_at || ""),
    date_asc:    (a, b) => (a.published_at || "").localeCompare(b.published_at || ""),
    salary_desc: (a, b) => sal(b) - sal(a),
    salary_asc:  (a, b) => sal(a) - sal(b),
    priority:    (a, b) => (a.priority - b.priority) ||
                           (b.published_at || "").localeCompare(a.published_at || ""),
  }[s];
  state.filtered.sort(cmp);
}

function render() {
  $("#count").textContent = `${state.filtered.length} вакансий`;
  if (!state.filtered.length) {
    $("#cards").innerHTML = `<div class="empty">Ничего не найдено по текущим фильтрам.</div>`;
    return;
  }
  $("#cards").innerHTML = state.filtered.map(card).join("");
}

function card(v) {
  const sal = formatSalary(v);
  const isRemote = v.schedule === "remote";
  const isMoscow = v.area_name === "Москва";
  const tags = [];
  if (isMoscow) tags.push(`<span class="tag moscow">Москва</span>`);
  else if (v.area_name) tags.push(`<span class="tag">${esc(v.area_name)}</span>`);
  if (isRemote) tags.push(`<span class="tag remote">удалёнка</span>`);
  if (v.schedule && !isRemote) tags.push(`<span class="tag">${esc(SCHEDULE_LABELS[v.schedule] || v.schedule)}</span>`);
  if (v.experience) tags.push(`<span class="tag">${esc(experienceLabel(v.experience))}</span>`);

  const snippetParts = [];
  if (v.responsibility) snippetParts.push(v.responsibility);
  if (v.requirement) snippetParts.push(v.requirement);
  const snippet = snippetParts.join(" · ");

  return `
    <article class="card ${v.priority === 1 ? "priority" : ""}">
      <div class="title"><a href="${esc(v.url)}" target="_blank" rel="noopener">${esc(v.title || "")}</a></div>
      <div class="company">${esc(v.company || "")}</div>
      <div class="salary ${v.salary_gross ? "gross" : ""}">${sal}</div>
      <div class="meta">${tags.join("")}</div>
      ${snippet ? `<div class="snippet">${snippet}</div>` : ""}
      <div class="footer">
        <span class="role-tag">${esc(v.role_query || "")}</span>
        <time>${formatDate(v.published_at)}</time>
      </div>
    </article>`;
}

function formatSalary(v) {
  const c = currencySymbol(v.currency);
  const fmt = (n) => n.toLocaleString("ru-RU");
  if (v.salary_from && v.salary_to) return `${fmt(v.salary_from)} – ${fmt(v.salary_to)} ${c}`;
  if (v.salary_from) return `от ${fmt(v.salary_from)} ${c}`;
  if (v.salary_to)   return `до ${fmt(v.salary_to)} ${c}`;
  return "ЗП не указана";
}
function currencySymbol(c) { return ({ RUR: "₽", RUB: "₽", USD: "$", EUR: "€", KZT: "₸" })[c] || c || ""; }
function experienceLabel(id) {
  return ({ noExperience: "без опыта", between1And3: "1–3 года", between3And6: "3–6 лет", moreThan6: "6+ лет" })[id] || id;
}
function formatDate(s) {
  if (!s) return "";
  try {
    return new Date(s).toLocaleDateString("ru-RU", { day: "2-digit", month: "short", year: "numeric" });
  } catch { return s; }
}
function esc(s) {
  return String(s ?? "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

// События
$("#q").addEventListener("input", (e) => { state.filters.q = e.target.value; apply(); });
$("#min-salary").addEventListener("input", (e) => { state.filters.minSalary = Number(e.target.value) || 0; apply(); });
$("#sort").addEventListener("change", (e) => { state.sort = e.target.value; sortFiltered(); render(); });
$("#only-priority").addEventListener("change", (e) => { state.filters.onlyPriority = e.target.checked; apply(); });

document.addEventListener("change", (e) => {
  const t = e.target;
  if (t.matches("input[data-role]")) {
    if (t.checked) state.filters.roles.add(t.dataset.role);
    else state.filters.roles.delete(t.dataset.role);
    apply();
  }
  if (t.matches("input[data-schedule]")) {
    if (t.checked) state.filters.schedules.add(t.dataset.schedule);
    else state.filters.schedules.delete(t.dataset.schedule);
    apply();
  }
});

$("#reset").addEventListener("click", () => {
  state.filters = { q: "", minSalary: 0, roles: new Set(), schedules: new Set(), onlyPriority: false };
  $("#q").value = "";
  $("#min-salary").value = "";
  $("#only-priority").checked = false;
  document.querySelectorAll("aside input[type=checkbox]").forEach((c) => (c.checked = false));
  apply();
});

load();
</script>
</body>
</html>
